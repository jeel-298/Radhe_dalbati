@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Nunito:wght@400;500;600;700;800&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body,#root{height:100%;background:#0F0A05;color:#F5ECD8;font-family:'Nunito',sans-serif;}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:#1A1108;}
::-webkit-scrollbar-thumb{background:#6A4828;border-radius:3px;}

@keyframes fadeUp{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}
@keyframes popIn{from{opacity:0;transform:scale(.94);}to{opacity:1;transform:scale(1);}}
@keyframes slideUp{from{opacity:0;transform:translateY(30px);}to{opacity:1;transform:translateY(0);}}
@keyframes shake{0%,100%{transform:translateX(0);}25%{transform:translateX(-7px);}75%{transform:translateX(7px);}}
.fade{animation:fadeUp .28s ease both;}
.pop{animation:popIn .2s ease both;}

/* APP SHELL */
.app{display:flex;height:100vh;overflow:hidden;}

/* SIDEBAR desktop */
.sidebar{width:220px;min-width:220px;background:#1A1108;border-right:1px solid #4A3020;display:flex;flex-direction:column;height:100vh;overflow:hidden;flex-shrink:0;}
.sidebar-logo{padding:20px 18px 14px;border-bottom:1px solid #4A3020;}
.logo-em{font-size:30px;margin-bottom:5px;}
.logo-title{font-family:'Cinzel',serif;font-size:15px;font-weight:700;color:#F5A623;line-height:1.2;}
.logo-sub{font-size:10px;color:#6A5040;margin-top:2px;letter-spacing:.8px;text-transform:uppercase;}
.sidebar-nav{flex:1;padding:10px 8px;display:flex;flex-direction:column;gap:2px;overflow-y:auto;}
.nav-section-lbl{font-size:10px;font-weight:700;color:#6A5040;letter-spacing:1px;text-transform:uppercase;padding:10px 10px 4px;}
.nav-btn{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:9px;border:none;background:transparent;color:#A08060;cursor:pointer;font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;width:100%;text-align:left;transition:all .16s;}
.nav-btn:hover{background:#241810;color:#F5ECD8;}
.nav-btn.active{background:linear-gradient(135deg,#C84B00,#E8671A);color:#fff;box-shadow:0 4px 14px rgba(200,75,0,.35);}
.nav-btn .nav-icon{width:20px;text-align:center;font-size:16px;flex-shrink:0;}
.sidebar-foot{padding:12px 14px;border-top:1px solid #4A3020;}
.sidebar-today{font-size:11px;color:#6A5040;margin-bottom:9px;line-height:1.6;}
.sidebar-today strong{color:#F5A623;}

/* BOTTOM NAV mobile */
.bottom-nav{display:none;position:fixed;bottom:0;left:0;right:0;z-index:200;background:#1A1108;border-top:1px solid #4A3020;box-shadow:0 -4px 20px rgba(0,0,0,.45);}
.bnav-inner{display:flex;align-items:center;justify-content:space-around;padding:0 4px;}
.bnav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:7px 2px 6px;border:none;background:transparent;cursor:pointer;gap:2px;color:#6A5040;font-family:'Nunito',sans-serif;font-size:9px;font-weight:700;transition:color .15s;-webkit-tap-highlight-color:transparent;min-width:0;}
.bnav-btn.active{color:#F5A623;}
.bnav-icon{width:34px;height:28px;display:flex;align-items:center;justify-content:center;font-size:18px;border-radius:9px;transition:background .15s;}
.bnav-btn.active .bnav-icon{background:rgba(200,75,0,.2);}
.bnav-fab{width:50px;height:50px;border-radius:15px;border:none;background:linear-gradient(135deg,#C84B00,#E8671A);color:#fff;font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(200,75,0,.55);margin-top:-14px;flex-shrink:0;-webkit-tap-highlight-color:transparent;}

/* MAIN */
.main-wrap{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;}
.topbar{background:#1A1108;border-bottom:1px solid #4A3020;padding:11px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.topbar-title{font-family:'Cinzel',serif;font-size:15px;font-weight:700;color:#F5ECD8;}
.page{flex:1;overflow-y:auto;overflow-x:hidden;padding:14px;-webkit-overflow-scrolling:touch;}

/* CARDS */
.card{background:#2E1F0F;border:1px solid #4A3020;border-radius:14px;overflow:hidden;}
.card-shadow{box-shadow:0 3px 16px rgba(0,0,0,.28);}
.card-hd{padding:12px 14px;border-bottom:1px solid #4A3020;display:flex;align-items:center;justify-content:space-between;}
.card-hd-title{font-family:'Cinzel',serif;font-size:13px;font-weight:600;color:#F5ECD8;}
.card-body{padding:14px;}

/* STAT GRID */
.stat-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:16px;}
.stat-card{background:#2E1F0F;border:1px solid #4A3020;border-radius:12px;padding:13px;position:relative;overflow:hidden;}
.stat-val{font-family:'Cinzel',serif;font-size:19px;font-weight:700;margin-bottom:2px;}
.stat-lbl{font-size:11px;color:#A08060;font-weight:700;}
.stat-sub{font-size:10px;color:#6A5040;margin-top:2px;}
.stat-icon{position:absolute;right:10px;top:10px;font-size:20px;opacity:.18;}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;border:none;border-radius:9px;cursor:pointer;font-family:'Nunito',sans-serif;font-weight:800;transition:all .16s;white-space:nowrap;-webkit-tap-highlight-color:transparent;}
.btn:active{transform:scale(.96);}
.btn-primary{background:linear-gradient(135deg,#C84B00,#E8671A);color:#fff;box-shadow:0 3px 10px rgba(200,75,0,.3);}
.btn-saffron{background:linear-gradient(135deg,#C4841C,#F5A623);color:#0F0A05;font-weight:800;}
.btn-green{background:rgba(76,175,80,.15);border:1px solid #4CAF50;color:#4CAF50;}
.btn-ghost{background:transparent;border:1.5px solid #4A3020;color:#A08060;}
.btn-ghost:hover{border-color:#6A4828;color:#F5ECD8;}
.btn-danger{background:rgba(239,83,80,.12);border:1px solid #EF5350;color:#EF5350;}
.btn-danger:hover{background:#EF5350;color:#fff;}
.btn-blue{background:rgba(66,165,245,.15);border:1px solid #42A5F5;color:#42A5F5;}
.btn-lg{padding:13px 22px;font-size:15px;border-radius:11px;}
.btn-md{padding:10px 18px;font-size:13px;}
.btn-sm{padding:7px 13px;font-size:12px;}
.btn-xs{padding:5px 10px;font-size:11px;border-radius:7px;}
.btn-w100{width:100%;}

/* FORM */
.field{display:flex;flex-direction:column;gap:5px;margin-bottom:13px;}
.lbl{font-size:12px;font-weight:700;color:#A08060;letter-spacing:.2px;}
.lbl em{font-style:normal;font-size:10px;color:#6A5040;margin-left:4px;}
.inp{background:#241810;border:1.5px solid #4A3020;border-radius:9px;padding:12px 13px;color:#F5ECD8;font-family:'Nunito',sans-serif;font-size:15px;outline:none;width:100%;transition:border .16s;}
.inp:focus{border-color:#F5A623;background:#1A1108;}
.inp::placeholder{color:#6A5040;}
select.inp{cursor:pointer;}

/* TABLES \u2014 hidden on mobile, shown desktop */
.tbl-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;}
.tbl{width:100%;border-collapse:collapse;}
.tbl th{padding:9px 12px;text-align:left;font-size:11px;font-weight:700;color:#6A5040;text-transform:uppercase;letter-spacing:.4px;border-bottom:1px solid #4A3020;background:#241810;}
.tbl td{padding:10px 12px;border-bottom:1px solid rgba(74,48,32,.3);font-size:13px;vertical-align:middle;}
.tbl tr:last-child td{border-bottom:none;}
.tbl tr:hover td{background:rgba(255,255,255,.02);}

/* MOBILE CARD LIST \u2014 shown on mobile, hidden on desktop */
.mob-list{display:none;flex-direction:column;gap:9px;}
.mob-row{background:#2E1F0F;border:1px solid #4A3020;border-radius:13px;padding:13px 14px;}
.mob-row-hd{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:6px;}
.mob-row-title{font-weight:800;font-size:14px;color:#F5ECD8;}
.mob-row-amount{font-family:'Cinzel',serif;font-size:18px;font-weight:700;color:#F5A623;white-space:nowrap;}
.mob-row-meta{font-size:12px;color:#A08060;display:flex;flex-wrap:wrap;gap:7px;align-items:center;margin-bottom:4px;}
.mob-row-actions{display:flex;gap:8px;margin-top:10px;}

/* BADGES */
.badge{display:inline-flex;align-items:center;gap:3px;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:700;}
.badge-cash{background:rgba(76,175,80,.15);color:#4CAF50;border:1px solid rgba(76,175,80,.3);}
.badge-online{background:rgba(66,165,245,.15);color:#42A5F5;border:1px solid rgba(66,165,245,.3);}
.badge-ok{background:rgba(76,175,80,.12);color:#4CAF50;}
.badge-low{background:rgba(239,83,80,.12);color:#EF5350;}
.badge-saf{background:rgba(245,166,35,.12);color:#F5A623;}

/* TABS */
.tabs{display:flex;gap:3px;background:#241810;border:1px solid #4A3020;border-radius:10px;padding:4px;overflow-x:auto;-webkit-overflow-scrolling:touch;}
.tabs::-webkit-scrollbar{display:none;}
.tab{padding:7px 14px;border-radius:7px;border:none;cursor:pointer;font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;background:transparent;color:#A08060;transition:all .16s;white-space:nowrap;flex-shrink:0;-webkit-tap-highlight-color:transparent;}
.tab.active{background:#C84B00;color:#fff;}

/* MODAL \u2014 bottom sheet on mobile, centered on desktop */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:500;display:flex;align-items:flex-end;justify-content:center;backdrop-filter:blur(3px);}
.modal{background:#1A1108;border:1px solid #6A4828;border-radius:20px 20px 0 0;width:100%;max-height:92vh;overflow:hidden;animation:slideUp .26s ease;display:flex;flex-direction:column;}
.modal-hd{padding:14px 16px;border-bottom:1px solid #4A3020;display:flex;align-items:center;gap:10px;flex-shrink:0;}
.modal-hd-icon{font-size:22px;}
.modal-hd-title{font-family:'Cinzel',serif;font-size:15px;font-weight:600;color:#F5ECD8;}
.modal-body{padding:14px 16px;overflow-y:auto;-webkit-overflow-scrolling:touch;flex:1;}
.modal-ft{padding:12px 16px;border-top:1px solid #4A3020;display:flex;gap:9px;flex-shrink:0;}

/* PAYMENT TOGGLE */
.pay-toggle{display:flex;gap:10px;}
.pay-opt{flex:1;padding:14px;border-radius:11px;border:2px solid #4A3020;background:#241810;cursor:pointer;text-align:center;font-family:'Nunito',sans-serif;font-size:15px;font-weight:700;transition:all .16s;color:#A08060;-webkit-tap-highlight-color:transparent;}
.pay-opt.active-cash{border-color:#4CAF50;background:rgba(76,175,80,.1);color:#4CAF50;}
.pay-opt.active-online{border-color:#42A5F5;background:rgba(66,165,245,.1);color:#42A5F5;}

/* QTY CONTROL */
.qty-ctrl{display:flex;align-items:center;border:1.5px solid #4A3020;border-radius:9px;overflow:hidden;}
.qty-btn{width:38px;height:38px;border:none;background:transparent;color:#A08060;font-size:19px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .14s;-webkit-tap-highlight-color:transparent;}
.qty-btn:active{background:#C84B00;color:#fff;}
.qty-num{width:40px;text-align:center;font-size:15px;font-weight:800;color:#F5ECD8;}

/* ITEM GRID bill builder */
.item-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px;}
.item-tile{background:#241810;border:1.5px solid #4A3020;border-radius:11px;padding:10px 6px;cursor:pointer;text-align:center;font-family:'Nunito',sans-serif;transition:border-color .15s,background .15s;-webkit-tap-highlight-color:transparent;user-select:none;}
.item-tile:active{transform:scale(.95);}
.item-tile.in-cart{background:rgba(200,75,0,.14);border-color:#C84B00;}

/* CHIP ROW (category filter) */
.chip-row{display:flex;gap:6px;overflow-x:auto;padding-bottom:6px;-webkit-overflow-scrolling:touch;margin-bottom:12px;}
.chip-row::-webkit-scrollbar{display:none;}
.chip{padding:6px 14px;border-radius:20px;border:1.5px solid #4A3020;background:#241810;color:#A08060;font-family:'Nunito',sans-serif;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;flex-shrink:0;transition:all .15s;-webkit-tap-highlight-color:transparent;}
.chip.active{border-color:#C84B00;background:#C84B00;color:#fff;}

/* INVOICE */
.invoice-wrap{background:#fff;color:#111;border-radius:12px;padding:20px;font-family:'Nunito',sans-serif;}
@media print{
  body *{visibility:hidden !important;}
  .invoice-print,.invoice-print *{visibility:visible !important;}
  .invoice-print{position:fixed;inset:0;z-index:9999;background:#fff;padding:20px;}
}

/* TOASTS */
.toasts{position:fixed;bottom:76px;left:50%;transform:translateX(-50%);z-index:999;display:flex;flex-direction:column;align-items:center;gap:7px;pointer-events:none;width:calc(100% - 32px);max-width:360px;}
.toast{padding:11px 18px;border-radius:10px;font-size:13px;font-weight:700;animation:popIn .22s ease;box-shadow:0 5px 20px rgba(0,0,0,.45);width:100%;text-align:center;}
.toast-s{background:#2E7D32;border:1px solid #4CAF50;color:#A5D6A7;}
.toast-e{background:#C62828;border:1px solid #EF5350;color:#FFCDD2;}
.toast-i{background:#2E1F0F;border:1px solid #6A4828;color:#F5ECD8;}

/* CONFIRM */
.confirm-box{background:#1A1108;border:1px solid #6A4828;border-radius:20px;padding:26px 22px;max-width:340px;width:calc(100% - 32px);text-align:center;animation:popIn .22s ease;margin:auto;}

/* MISC UTILS */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.row{display:flex;align-items:center;gap:10px;}
.row-b{display:flex;align-items:center;justify-content:space-between;}
.divider{border:none;border-top:1px solid #4A3020;margin:12px 0;}
.muted{color:#A08060;} .faint{color:#6A5040;}
.saf{color:#F5A623;} .grn{color:#4CAF50;} .red{color:#EF5350;} .blu{color:#42A5F5;}
.bold{font-weight:800;}
.sec-title{font-family:'Cinzel',serif;font-size:17px;font-weight:700;color:#F5A623;margin-bottom:3px;}
.sec-sub{font-size:12px;color:#A08060;margin-bottom:14px;}
input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;}
input[type=number]{-moz-appearance:textfield;}

/* RESPONSIVE BREAKPOINTS */
@media(min-width:700px){
  .overlay{align-items:center;padding:16px;}
  .modal{border-radius:18px;max-width:620px;max-height:88vh;}
  .item-grid{grid-template-columns:repeat(4,1fr);}
  .toasts{bottom:24px;left:auto;right:24px;transform:none;width:auto;max-width:340px;}
}
@media(min-width:900px){
  .bottom-nav{display:none!important;}
  .sidebar{display:flex!important;}
  .page{padding:22px;}
  .stat-grid{grid-template-columns:repeat(4,1fr);}
  .stat-val{font-size:22px;}
  .stat-card{padding:16px;}
  .tbl-wrap{display:block!important;}
  .mob-list{display:none!important;}
}
@media(max-width:899px){
  .sidebar{display:none!important;}
  .bottom-nav{display:block!important;}
  .page{padding-bottom:82px;}
  .tbl-wrap{display:none!important;}
  .mob-list{display:flex!important;}
  .stat-grid{grid-template-columns:repeat(2,1fr);}
}
@media(max-width:420px){
  .stat-val{font-size:16px;}
  .stat-card{padding:11px;}
  .sec-title{font-size:15px;}
  .item-grid{grid-template-columns:repeat(3,1fr);gap:6px;}
}
